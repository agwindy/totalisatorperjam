<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Totalisator SPBU 3417603</title>

<style>

/* ================= GLOBAL ================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  overflow-x:hidden;
}

body{
  font-family:Segoe UI,sans-serif;
  background:#edf4ff;
  padding:10px;
}

/* ================= HEADER ================= */

.header{
  background:linear-gradient(135deg,#0f172a,#2563eb);
  color:white;
  padding:14px;
  border-radius:12px;
  margin-bottom:12px;
}

.header h1{
  font-size:18px;
}

/* ================= WRAPPER ================= */

.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
}

/* ================= CARD ================= */

.card{
  background:white;
  border-radius:12px;
  padding:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
  width:100%;
  overflow:hidden;
}

/* ================= TITLE ================= */

.title{
  padding:8px;
  color:white;
  border-radius:8px;
  margin-bottom:10px;
  font-weight:bold;
}

.pertalite{
  background:linear-gradient(135deg,#16a34a,#22c55e);
}

.pertamax{
  background:linear-gradient(135deg,#1d4ed8,#3b82f6);
}

/* ================= TABLE RESPONSIVE ================= */

.table-wrap{
  width:100%;
  overflow:hidden;
}

table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

th,td{
  border:1px solid #ddd;
  padding:4px;
  font-size:10px;
  text-align:center;
  word-wrap:break-word;
}

/* ================= INPUT ================= */

.input-box{
  display:flex;
  align-items:center;
  gap:2px;
  width:100%;
}

input{
  width:100%;
  min-width:0;
  padding:3px;
  font-size:10px;
  border:1px solid #ccc;
  border-radius:5px;
}

/* ================= MINI BUTTON ================= */

.mini-btn{
  width:18px;
  height:18px;
  border:none;
  font-size:8px;
  color:white;
  border-radius:3px;
  cursor:pointer;
  flex-shrink:0;
}

.copy{background:#2563eb;}
.clear{background:#dc2626;}

/* ================= TOTAL ================= */

.total{
  margin-top:6px;
  font-size:14px;
  font-weight:bold;
  color:#16a34a;
}

/* ================= STOK ================= */

.stok-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
  margin-top:8px;
}

.stok-grid label{
  font-size:9px;
}

.stok-grid input{
  font-size:10px;
  padding:3px;
}

/* ================= BUTTON ================= */

.btn{
  margin-top:8px;
  width:100%;
  border:none;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  color:white;
  font-size:12px;
}

.lock-p{background:#16a34a;}
.lock-m{background:#1d4ed8;}

/* ================= SUPER RESPONSIVE ================= */

@media(max-width:480px){

  body{
    padding:6px;
  }

  .header h1{
    font-size:15px;
  }

  th,td{
    font-size:9px;
    padding:3px;
  }

  input{
    font-size:9px;
    padding:2px;
  }

  .mini-btn{
    width:16px;
    height:16px;
    font-size:7px;
  }

  .total{
    font-size:13px;
  }

  .stok-grid{
    grid-template-columns:1fr; /* <- AUTO STACK */
  }

}

/* ================= FINAL SAFETY (NO SCROLL) ================= */

table{
  max-width:100%;
}

</style>
</head>

<body>

<div class="header">
  <h1>TOTALISATOR SPBU 3417603</h1>
</div>

<div class="grid">

<!-- ================= PERTALITE ================= -->

<div class="card">

  <div class="title pertalite">PERTALITE</div>

  <div class="table-wrap">

    <table>

      <tr>
        <th>Nozzle</th>
        <th>Awal</th>
        <th>Akhir</th>
        <th>Hasil</th>
      </tr>

      <tr>
        <td>A1</td>
        <td>
          <div class="input-box">
            <input id="awalA1">
            <button class="mini-btn copy" onclick="copy('awalA1')">C</button>
            <button class="mini-btn clear" onclick="clearF('awalA1')">X</button>
          </div>
        </td>
        <td>
          <div class="input-box">
            <input id="akhirA1">
            <button class="mini-btn copy" onclick="copy('akhirA1')">C</button>
            <button class="mini-btn clear" onclick="clearF('akhirA1')">X</button>
          </div>
        </td>
        <td id="jualA1">0</td>
      </tr>

      <tr>
        <td>A2</td>
        <td>
          <div class="input-box">
            <input id="awalA2">
            <button class="mini-btn copy" onclick="copy('awalA2')">C</button>
            <button class="mini-btn clear" onclick="clearF('awalA2')">X</button>
          </div>
        </td>
        <td>
          <div class="input-box">
            <input id="akhirA2">
            <button class="mini-btn copy" onclick="copy('akhirA2')">C</button>
            <button class="mini-btn clear" onclick="clearF('akhirA2')">X</button>
          </div>
        </td>
        <td id="jualA2">0</td>
      </tr>

      <tr>
        <td>C</td>
        <td>
          <div class="input-box">
            <input id="awalC">
            <button class="mini-btn copy" onclick="copy('awalC')">C</button>
            <button class="mini-btn clear" onclick="clearF('awalC')">X</button>
          </div>
        </td>
        <td>
          <div class="input-box">
            <input id="akhirC">
            <button class="mini-btn copy" onclick="copy('akhirC')">C</button>
            <button class="mini-btn clear" onclick="clearF('akhirC')">X</button>
          </div>
        </td>
        <td id="jualC">0</td>
      </tr>

    </table>

  </div>

  <div class="total" id="totalPertalite">0</div>

  <div class="stok-grid">
    <div>
      <label>Stok Awal</label>
      <input id="stokAwalPertalite">
    </div>

    <div>
      <label>Stok Akhir</label>
      <input id="stokAkhirPertalite">
    </div>

    <div>
      <label>Hasil Stok</label>
      <input id="hasilPertalite" readonly>
    </div>
  </div>

  <button class="btn lock-p" onclick="lockPertalite()">🔒 Kunci Pertalite</button>

</div>

<!-- ================= PERTAMAX ================= -->

<div class="card">

  <div class="title pertamax">PERTAMAX</div>

  <div class="table-wrap">

    <table>

      <tr>
        <th>Nozzle</th>
        <th>Awal</th>
        <th>Akhir</th>
        <th>Hasil</th>
      </tr>

      <tr>
        <td>B1</td>
        <td>
          <div class="input-box">
            <input id="awalB1">
            <button class="mini-btn copy" onclick="copy('awalB1')">C</button>
            <button class="mini-btn clear" onclick="clearF('awalB1')">X</button>
          </div>
        </td>
        <td>
          <div class="input-box">
            <input id="akhirB1">
            <button class="mini-btn copy" onclick="copy('akhirB1')">C</button>
            <button class="mini-btn clear" onclick="clearF('akhirB1')">X</button>
          </div>
        </td>
        <td id="jualB1">0</td>
      </tr>

      <tr>
        <td>B2</td>
        <td>
          <div class="input-box">
            <input id="awalB2">
            <button class="mini-btn copy" onclick="copy('awalB2')">C</button>
            <button class="mini-btn clear" onclick="clearF('awalB2')">X</button>
          </div>
        </td>
        <td>
          <div class="input-box">
            <input id="akhirB2">
            <button class="mini-btn copy" onclick="copy('akhirB2')">C</button>
            <button class="mini-btn clear" onclick="clearF('akhirB2')">X</button>
          </div>
        </td>
        <td id="jualB2">0</td>
      </tr>

      <tr>
        <td>D</td>
        <td>
          <div class="input-box">
            <input id="awalD">
            <button class="mini-btn copy" onclick="copy('awalD')">C</button>
            <button class="mini-btn clear" onclick="clearF('awalD')">X</button>
          </div>
        </td>
        <td>
          <div class="input-box">
            <input id="akhirD">
            <button class="mini-btn copy" onclick="copy('akhirD')">C</button>
            <button class="mini-btn clear" onclick="clearF('akhirD')">X</button>
          </div>
        </td>
        <td id="jualD">0</td>
      </tr>

    </table>

  </div>

  <div class="total" id="totalPertamax">0</div>

  <div class="stok-grid">
    <div>
      <label>Stok Awal</label>
      <input id="stokAwalPertamax">
    </div>

    <div>
      <label>Stok Akhir</label>
      <input id="stokAkhirPertamax">
    </div>

    <div>
      <label>Hasil Stok</label>
      <input id="hasilPertamax" readonly>
    </div>
  </div>

  <button class="btn lock-m" onclick="lockPertamax()">🔒 Kunci Pertamax</button>

</div>

</div>

<script>

/* ================= HITUNG ================= */

const pertalite = ['A1','A2','C'];
const pertamax = ['B1','B2','D'];

function hitung(){

  let p1=0,p2=0;

  pertalite.forEach(n=>{
    let a=+document.getElementById('awal'+n).value||0;
    let b=+document.getElementById('akhir'+n).value||0;
    let j=b-a;
    document.getElementById('jual'+n).innerText=j;
    p1+=j;
  });

  pertamax.forEach(n=>{
    let a=+document.getElementById('awal'+n).value||0;
    let b=+document.getElementById('akhir'+n).value||0;
    let j=b-a;
    document.getElementById('jual'+n).innerText=j;
    p2+=j;
  });

  document.getElementById('totalPertalite').innerText=p1;
  document.getElementById('totalPertamax').innerText=p2;

  document.getElementById('hasilPertalite').value =
    (+document.getElementById('stokAwalPertalite').value||0) - p1 - (+document.getElementById('stokAkhirPertalite').value||0);

  document.getElementById('hasilPertamax').value =
    (+document.getElementById('stokAwalPertamax').value||0) - p2 - (+document.getElementById('stokAkhirPertamax').value||0);

}

/* ================= COPY ================= */

function copy(id){
  navigator.clipboard.writeText(document.getElementById(id).value||'');
}

/* ================= CLEAR ================= */

function clearF(id){
  document.getElementById(id).value='';
  hitung();
}

/* ================= LOCK ================= */

let lockP=false;
let lockM=false;

function lockPertalite(){

  lockP=!lockP;

  ['awalA1','awalA2','awalC','stokAwalPertalite'].forEach(id=>{
    document.getElementById(id).readOnly=lockP;
  });

  alert(lockP?"Pertalite Terkunci":"Pertalite Dibuka");
}

function lockPertamax(){

  lockM=!lockM;

  ['awalB1','awalB2','awalD','stokAwalPertamax'].forEach(id=>{
    document.getElementById(id).readOnly=lockM;
  });

  alert(lockM?"Pertamax Terkunci":"Pertamax Dibuka");
}

/* ================= AUTO ================= */

document.querySelectorAll('input').forEach(i=>{
  i.addEventListener('input',hitung);
});

hitung();

</script>

</body>
</html>
